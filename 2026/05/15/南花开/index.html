        <div class="verse">
            <div class="line">远赴滨津求紫白，</div>

            <div class="line">回首茫然北风笑，</div>
            <div class="line">从此不见南花开。</div>
        </div>

            —— 致那段北风与南花交织的岁月
        </div>
    
        <div class="poem-footer">
